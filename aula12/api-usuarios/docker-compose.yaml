services:
  postgres:
    image: postgres:16
    container_name: postgres_apiusuarios12
    restart: always
    environment:
      POSTGRES_DB: bd-api-usuarios
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: Coti@2026
    ports:
      - "5435:5432"
    volumes:
      - postgres_data_apiusuarios12:/var/lib/postgresql/data
    networks:
      - api_usuarios12_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_apiusuarios12
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    ports:
      - "5052:80"
    volumes:
      - pgadmin_data_apiusuarios12:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - api_usuarios12_network

volumes:
  postgres_data_apiusuarios12:
  pgadmin_data_apiusuarios12:

networks:
  api_usuarios12_network:
    driver: bridge