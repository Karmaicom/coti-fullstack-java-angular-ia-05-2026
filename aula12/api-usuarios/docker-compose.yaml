services:
  mysql:
    image: mysql:8.0
    container_name: mysql_apiusuarios12
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: bd_api_usuarios
      MYSQL_USER: coti
      MYSQL_PASSWORD: Coti@2026
    ports:
      - "3309:3306"
    volumes:
      - mysql_data_apiusuarios12:/var/lib/mysql
    networks:
      - api_usuarios12_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin_apiusuarios12
    restart: always
    environment:
      PMA_USER: coti
      PMA_PASSWORD: Coti@2026
      PMA_HOST: mysql
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "5052:80"
    depends_on:
      - mysql
    networks:
      - api_usuarios12_network

volumes:
  mysql_data_apiusuarios12:

networks:
  api_usuarios12_network:
    driver: bridge