version: '3.9'

services:
  postgres: #Nome do serviço
    image: postgres:16 #Instalador do serviço
    container_name: postgres_alunos #Nome do container (VM)
    restart: always #Sempre inicializar o serviço
    environment:
      POSTGRES_DB: bd-alunos
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: Coti@2026
    ports:
      - "5433:5432" #Portas  --> 5433 no Windows : 5432 no Docker
    volumes:
      - postgres_data:/var/lib/postgresql/data #Pastas
    networks:
      - alunos_network #Rede compartilhada

  pgadmin:
    image: dpage/pgadmin4:latest #Nome do serviço
    container_name: pgadmin_alunos #Nome do container (VM)
    restart: always #Sempre inicializar o serviço
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    ports:
      - "5050:80" #Porta
    depends_on:
      - postgres
    networks:
      - alunos_network

volumes:
  postgres_data:

networks:
  alunos_network:
    driver: bridge