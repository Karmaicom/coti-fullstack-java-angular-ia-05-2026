version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: postgres_bd_funcionarios
    restart: always
    environment:
      POSTGRES_DB: bd-funcionario
      POSTGRES_USER: coti
      POSTGRES_PASSWORD: Coti@2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - clientes_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin_bd_funcionarios
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: Coti@2026
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - clientes_network

volumes:
  postgres_data:

networks:
  clientes_network:
    driver: bridge